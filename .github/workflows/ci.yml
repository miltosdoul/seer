name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Format check
        run: uvx ruff format --check .
      - name: Lint
        run: uvx ruff check .

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Lockfile is up to date with pyproject.toml
        run: uv lock --check
      - name: Vulnerability audit (OSV)
        run: uv audit
      - name: Sync with malware check (OSV MAL advisories)
        run: uv sync
        env:
          UV_MALWARE_CHECK: "1"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: |
          uv run seer --help
          uv run seer-sync --help
